steps:
  - label: ":mag: Limier sample"
    commands:
      - >
        docker run --rm
        -v "$PWD:/work"
        -v /var/run/docker.sock:/var/run/docker.sock
        -w /work
        golang:1.26
        sh -lc 'apt-get update && apt-get install -y docker.io && sh ./examples/ci/run-sample.sh'
    artifact_paths:
      - "out/limier/**/*"
